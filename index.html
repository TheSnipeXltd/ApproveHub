<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>ApproveHub — Approvals &amp; Project Payments Demo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/app.css?v=1" />

  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script defer src="assets/js/app.js?v=1"></script>
</head>

<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="app-shell">
    <header class="app-header" role="banner">
      <div class="header-left">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">AH</div>
          <div class="brand-text">
            <div class="brand-name">ApproveHub</div>
            <div class="brand-sub">Approvals + Payments</div>
          </div>
        </div>
      </div>

      <div class="header-center">
        <div class="search">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input id="globalSearch" type="search" placeholder="Search jobs, invoices, payees…" aria-label="Global search" autocomplete="off" />
          <div id="searchPopover" class="popover popover-search" hidden></div>
        </div>
      </div>

      <div class="header-right">
        <div class="role-switch">
          <label class="sr-only" for="roleSelect">Role</label>
          <select id="roleSelect" aria-label="Role switcher">
            <option value="manager">Manager</option>
            <option value="client">Client</option>
            <option value="payee">Payee</option>
            <option value="accountant">Accountant</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <button id="themeToggle" class="icon-btn" type="button" aria-label="Theme toggle" title="Theme">
          <span aria-hidden="true">◐</span>
        </button>

        <button id="notifBtn" class="icon-btn" type="button" aria-label="Notifications" title="Notifications">
          <span aria-hidden="true">🔔</span>
          <span id="notifBadge" class="badge" hidden>0</span>
        </button>

        <a class="icon-btn" href="#/settings" aria-label="Settings" title="Settings">
          <span aria-hidden="true">⚙</span>
        </a>
      </div>
    </header>

    <div class="app-body">
      <nav id="sideNav" class="app-nav" aria-label="Primary">
        <a class="nav-item" href="#/jobs" data-route="jobs"><span class="nav-ic" aria-hidden="true">🗂</span><span class="nav-t">Jobs</span><span class="nav-count" id="navCountJobs" hidden>0</span></a>
        <a class="nav-item" href="#/payments" data-route="payments"><span class="nav-ic" aria-hidden="true">💳</span><span class="nav-t">Payments</span><span class="nav-count" id="navCountPayments" hidden>0</span></a>
        <a class="nav-item" href="#/approvals" data-route="approvals"><span class="nav-ic" aria-hidden="true">✅</span><span class="nav-t">Approvals</span><span class="nav-count" id="navCountApprovals" hidden>0</span></a>
        <a class="nav-item" href="#/disputes" data-route="disputes"><span class="nav-ic" aria-hidden="true">⚠</span><span class="nav-t">Disputes</span><span class="nav-count" id="navCountDisputes" hidden>0</span></a>
        <a class="nav-item" href="#/messages" data-route="messages"><span class="nav-ic" aria-hidden="true">💬</span><span class="nav-t">Messages</span><span class="nav-count" id="navCountMessages" hidden>0</span></a>
        <a class="nav-item" href="#/company" data-route="company"><span class="nav-ic" aria-hidden="true">🏢</span><span class="nav-t">Company</span></a>
        <a class="nav-item" href="#/reports" data-route="reports"><span class="nav-ic" aria-hidden="true">📈</span><span class="nav-t">Reports</span></a>
        <a class="nav-item" href="#/settings" data-route="settings"><span class="nav-ic" aria-hidden="true">🛠</span><span class="nav-t">Settings</span></a>

        <div class="nav-footer">
          <div class="tiny"><span class="dot" aria-hidden="true"></span><span id="envLabel">Static demo • localStorage</span></div>
        </div>
      </nav>

      <main id="main" class="app-main" tabindex="-1">
        <div id="view" class="view"><!-- routed content --></div>

        <footer class="app-footer">
          <div class="footer-links">
            <a href="privacy.html">Privacy</a>
            <span aria-hidden="true">·</span>
            <a href="terms.html">Terms</a>
            <span aria-hidden="true">·</span>
            <a href="cookies.html">Cookies</a>
          </div>
          <div class="footer-legal">
            We do not hold client funds. Funds are held and released by our escrow/PBA partner.
          </div>
        </footer>
      </main>
    </div>
  </div>

  <div id="modalRoot" class="modal-root" aria-hidden="true" hidden></div>
  <div id="toasts" class="toasts" aria-live="polite" aria-atomic="true"></div>

  <noscript>
    <div class="noscript">This demo requires JavaScript enabled.</div>
  </noscript>
</body>
</html>
